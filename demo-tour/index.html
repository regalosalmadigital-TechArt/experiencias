<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Amigo en Mérida | Reservas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --turquesa: #00C2CB;
            --turquesa-dark: #008B94;
            --white: #ffffff;
            --text: #333333;
            --light-bg: #f0fafa;
        }

        body { font-family: 'Urbanist', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: var(--text); }

        .container { max-width: 550px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #eee; }
        
        .section-title { color: var(--turquesa-dark); font-size: 14px; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: block; }

        /* Selector de Tour */
        .tour-picker { width: 100%; padding: 15px; font-size: 16px; border: 2px solid var(--turquesa); border-radius: 12px; margin-bottom: 25px; }

        /* Controles de Personas (Botones +/-) */
        .counter-group { display: flex; align-items: center; justify-content: space-between; background: var(--light-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .counter-controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 50%; border: none; background: var(--turquesa); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-qty:disabled { background: #ccc; }
        .qty-val { font-size: 18px; font-weight: bold; width: 20px; text-align: center; }

        /* Input de Fecha con validación visual */
        input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 25px; }
        input[type="date"].error { border-color: #ff4d4d; background-color: #fff5f5; }

        .summary-box { background: var(--turquesa-dark); color: white; padding: 20px; border-radius: 16px; text-align: center; }
        .total-price { font-size: 32px; font-weight: bold; display: block; }

        .btn-whatsapp { display: block; background: #25D366; color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .warning { color: #ff4d4d; font-size: 12px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <span class="section-title">1. Elige tu Tour</span>
    <select id="tour-select" class="tour-picker" onchange="calcular()">
        <option value="cenotes" data-adulto="650" data-nino="450">Tour 4 Cenotes</option>
        <option value="chichen" data-adulto="1200" data-nino="850">Chichén Itzá Premium</option>
        <option value="celestun" data-adulto="950" data-nino="700">Celestún Aventura</option>
    </select>

    <span class="section-title">2. ¿Cuándo nos vemos?</span>
    <input type="date" id="fecha" onchange="validarFecha()">

    <span class="section-title">3. Cantidad de Personas</span>
    
    <div class="counter-group">
        <span>Adultos</span>
        <div class="counter-controls">
            <button class="btn-qty" onclick="cambiarCant('adultos', -1)">-</button>
            <span id="qty-adultos" class="qty-val">1</span>
            <button class="btn-qty" onclick="cambiarCant('adultos', 1)">+</button>
        </div>
    </div>

    <div class="counter-group">
        <span>Niños (-12 años)</span>
        <div class="counter-controls">
            <button class="btn-qty" onclick="cambiarCant('ninos', -1)">-</button>
            <span id="qty-ninos" class="qty-val">0</span>
            <button class="btn-qty" onclick="cambiarCant('ninos', 1)">+</button>
        </div>
    </div>

    <div class="summary-box">
        <span style="font-size: 14px; opacity: 0.9;">Inversión Total:</span>
        <span class="total-price" id="total-display">$650 MXN</span>
    </div>

    <div id="error-msg" class="warning">⚠️ Por favor selecciona una fecha válida</div>
    <a href="javascript:void(0)" onclick="intentarEnviar()" class="btn-whatsapp">Reservar ahora</a>
</div>

<script>
    let cantAdultos = 1;
    let cantNinos = 0;

    function cambiarCant(tipo, cambio) {
        if (tipo === 'adultos') {
            cantAdultos = Math.max(1, cantAdultos + cambio);
            document.getElementById('qty-adultos').innerText = cantAdultos;
        } else {
            cantNinos = Math.max(0, cantNinos + cambio);
            document.getElementById('qty-ninos').innerText = cantNinos;
        }
        calcular();
    }

    function validarFecha() {
        const fechaInput = document.getElementById('fecha');
        if (fechaInput.value) {
            fechaInput.classList.remove('error');
            document.getElementById('error-msg').style.display = 'none';
        }
    }

    function calcular() {
        const select = document.getElementById('tour-select');
        const option = select.options[select.selectedIndex];
        const pAdulto = parseInt(option.getAttribute('data-adulto'));
        const pNino = parseInt(option.getAttribute('data-nino'));
        
        const total = (cantAdultos * pAdulto) + (cantNinos * pNino);
        document.getElementById('total-display').innerText = `$${total.toLocaleString()} MXN`;
    }

    function intentarEnviar() {
        const fecha = document.getElementById('fecha').value;
        const select = document.getElementById('tour-select');
        const tourName = select.options[select.selectedIndex].text;
        const total = document.getElementById('total-display').innerText;

        if (!fecha) {
            document.getElementById('fecha').classList.add('error');
            document.getElementById('error-msg').style.display = 'block';
            return;
        }

        const telefono = "525560040025";
        let mensaje = `¡Hola! Quiero reservar con Un Amigo en Mérida:\n\n`;
        mensaje += `🌴 Tour: ${tourName}\n`;
        mensaje += `📅 Fecha: ${fecha}\n`;
        mensaje += `👥 Adultos: ${cantAdultos}\n`;
        mensaje += `👶 Niños: ${cantNinos}\n`;
        mensaje += `💰 Total estimado: ${total}`;

        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>

</body>
</html>
