<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Tours | Roberto Javier</title>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .tour-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .controles-pax { margin: 15px 0; }
    </style>
</head>
<body>

    <div class="tour-card" data-nombre="Tour Peña de Bernal" data-precio="850">
        <h2>Tour Peña de Bernal</h2>
        <p>Precio: $850 MXN por persona</p>
        
        <label>Fecha:</label>
        <input type="date" id="fecha-tour">
        
        <div class="controles-pax">
            <label>Personas: </label>
            <button onclick="ajustarPax(-1)">-</button>
            <span id="pax-count">1</span>
            <button onclick="ajustarPax(1)">+</button>
        </div>

        <button onclick="generarReserva()" style="width: 100%; font-weight: bold;">
            Consultar Disponibilidad (Total: <span id="total-reserva">$850</span>)
        </button>
    </div>

    <script>
        let pax = 1;
        const precioUnitario = 850;

        function ajustarPax(cambio) {
            pax += cambio;
            if (pax < 1) pax = 1;
            document.getElementById('pax-count').innerText = pax;
            document.getElementById('total-reserva').innerText = `$${pax * precioUnitario}`;
        }

        function generarReserva() {
            const fecha = document.getElementById('fecha-tour').value;
            const total = pax * precioUnitario;
            
            if (!fecha) return alert("Selecciona una fecha");

            const mensaje = `*Nueva Solicitud de Tour*\n\n📍 Tour: Peña de Bernal\n📅 Fecha: ${fecha}\n👥 Personas: ${pax}\n💰 Total: $${total}\n\n¿Tienes lugar?`;
            const telefono = "524411403186"; // Número de Roberto
            window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
        }
    </script>

</body>
</html>
