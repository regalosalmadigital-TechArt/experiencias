<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Amigo en Mérida | Reservas Inteligentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --turquesa: #00C2CB;
            --turquesa-dark: #008B94;
            --white: #ffffff;
            --text: #333333;
            --light-bg: #f0fafa;
        }

        body { font-family: 'Urbanist', sans-serif; margin: 0; background-color: #f4f7f6; color: var(--text); }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1518105779142-d975f22f1b0a?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .hero h1 { font-size: 32px; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 500px; margin: -40px auto 50px; background: var(--white);
            padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section-title { color: var(--turquesa-dark); font-size: 14px; text-transform: uppercase; font-weight: bold; margin: 20px 0 10px 0; display: block; }

        /* Estilos del Calendario */
        .calendar-input {
            width: 100%; padding: 15px; border: 2px solid var(--turquesa);
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
            background: var(--light-bg); cursor: pointer; font-family: inherit;
        }

        .counter-group { display: flex; align-items: center; justify-content: space-between; background: var(--light-bg); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 50%; border: none; background: var(--turquesa); color: white; font-size: 20px; cursor: pointer; }

        .summary-box { background: var(--turquesa-dark); color: white; padding: 20px; border-radius: 16px; text-align: center; margin-top: 20px; }
        .btn-whatsapp { display: block; background: #25D366; color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>UN AMIGO EN MÉRIDA</h1>
    <p style="font-weight: bold; color: var(--turquesa);">Reserva tu próxima aventura</p>
</div>

<div class="container">
    <span class="section-title">1. Elige tu Tour</span>
    <select id="tour-select" class="calendar-input" style="margin-bottom: 15px;" onchange="calcular()">
        <option value="cenotes" data-adulto="650" data-nino="450">Tour 4 Cenotes</option>
        <option value="chichen" data-adulto="1200" data-nino="850">Chichén Itzá Premium</option>
        <option value="celestun" data-adulto="950" data-nino="700">Celestún Aventura</option>
    </select>

    <span class="section-title">2. Selecciona Rango de Fechas</span>
    <input type="text" id="rango-fechas" class="calendar-input" placeholder="Toca para elegir fechas...">

    <span class="section-title">3. Personas</span>
    <div class="counter-group">
        <span>Adultos</span>
        <div>
            <button class="btn-qty" onclick="cambiarCant('adultos', -1)">-</button>
            <span id="qty-adultos" style="font-weight:bold; margin: 0 10px;">1</span>
            <button class="btn-qty" onclick="cambiarCant('adultos', 1)">+</button>
        </div>
    </div>

    <div class="summary-box">
        <span id="total-display" style="font-size: 28px; font-weight: bold;">$650 MXN</span>
    </div>

    <a href="javascript:void(0)" onclick="enviarWhatsApp()" class="btn-whatsapp">Confirmar Disponibilidad</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
    let cantAdultos = 1;
    let cantNinos = 0;
    let fechasSeleccionadas = "";

    // CONFIGURACIÓN DE BLOQUEO CON SHEETDB
    // Reemplaza 'TU_API_URL' por tu enlace de SheetDB
    const SHEETDB_URL = 'https://sheetdb.io/api/v1/TU_ID_AQUI?sheet=bloqueos';

    const calendario = flatpickr("#rango-fechas", {
        mode: "range",
        minDate: "today",
        locale: "es",
        dateFormat: "d-m-Y",
        disable: [], // Aquí se cargarán las fechas de la API
        onClose: function(selectedDates) {
            if(selectedDates.length === 2) {
                fechasSeleccionadas = `${selectedDates[0].toLocaleDateString()} al ${selectedDates[1].toLocaleDateString()}`;
            } else {
                fechasSeleccionadas = selectedDates[0]?.toLocaleDateString() || "";
            }
        }
    });

    // Cargar fechas bloqueadas desde Google Sheets
    fetch(SHEETDB_URL)
        .then(res => res.json())
        .then(data => {
            const bloqueos = data.map(item => item.fecha); // Asegúrate que tu columna se llame 'fecha'
            calendario.set("disable", bloqueos);
        })
        .catch(err => console.log("Usando calendario sin bloqueos remotos"));

    function cambiarCant(tipo, cambio) {
        if(tipo === 'adultos') cantAdultos = Math.max(1, cantAdultos + cambio);
        document.getElementById('qty-adultos').innerText = cantAdultos;
        calcular();
    }

    function calcular() {
        const select = document.getElementById('tour-select');
        const pAdulto = parseInt(select.options[select.selectedIndex].getAttribute('data-adulto'));
        const total = (cantAdultos * pAdulto);
        document.getElementById('total-display').innerText = `$${total.toLocaleString()} MXN`;
    }

    function enviarWhatsApp() {
        if(!fechasSeleccionadas) {
            alert("Por favor elige una fecha");
            return;
        }
        const tour = document.getElementById('tour-select').options[document.getElementById('tour-select').selectedIndex].text;
        const msg = `¡Hola! Quiero reservar con *Un Amigo en Mérida*:\n🌴 *Tour:* ${tour}\n📅 *Fechas:* ${fechasSeleccionadas}\n👥 *Adultos:* ${cantAdultos}\n💰 *Total:* ${document.getElementById('total-display').innerText}`;
        window.open(`https://wa.me/525560040025?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
