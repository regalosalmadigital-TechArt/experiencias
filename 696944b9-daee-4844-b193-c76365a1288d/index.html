<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo Especial</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #d4af37; /* Color Dorado */
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #d4af37;
            padding: 40px;
            border-radius: 10px;
            max-width: 80%;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #fdfdfd; }
        .photo-frame {
            width: 200px;
            height: 200px;
            border: 3px solid #d4af37;
            border-radius: 50%;
            margin: 20px auto;
            overflow: hidden;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="photo-frame">
            <img src="https://picsum.photos/200" alt="Recuerdo">
        </div>
        <h1>Para: Yareli</h1>
        <p>"Porque cada momento a tu lado es un regalo que el tiempo no puede borrar. Gracias por ser mi mejor aventura."</p>
        <div class="footer">Escaneado desde tu Caja Premium Nuu</div>
    </div>
</body>
</html>
