<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Amigo en Mérida | Reservas e Información</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --turquesa: #00C2CB;
            --turquesa-dark: #008B94;
            --white: #ffffff;
            --text: #333333;
            --light-bg: #f0fafa;
        }

        body { font-family: 'Urbanist', sans-serif; margin: 0; background-color: #f4f7f6; color: var(--text); }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1505935428862-770b6f24f629?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            height: 25vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .hero h1 { font-size: 28px; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 500px; margin: -30px auto 50px; background: var(--white);
            padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section-title { color: var(--turquesa-dark); font-size: 13px; text-transform: uppercase; font-weight: bold; margin: 20px 0 10px 0; display: block; border-left: 4px solid var(--turquesa); padding-left: 10px;}

        .description-box {
            background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px dashed var(--turquesa);
            font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.4;
        }

        .calendar-input, .tour-picker {
            width: 100%; padding: 12px; border: 2px solid var(--turquesa);
            border-radius: 10px; font-size: 16px; box-sizing: border-box;
            background: var(--light-bg); cursor: pointer; font-family: inherit;
        }

        .counter-group { display: flex; align-items: center; justify-content: space-between; background: var(--light-bg); padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--turquesa); color: white; font-size: 18px; cursor: pointer; }

        .summary-box { background: var(--turquesa-dark); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .total-price { font-size: 28px; font-weight: bold; display: block; }

        .btn-whatsapp { display: block; background: #25D366; color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

<div class="hero">
    <h1>UN AMIGO EN MÉRIDA</h1>
</div>

<div class="container">
    <span class="section-title">1. Elige tu Aventura</span>
    <select id="tour-select" class="tour-picker" onchange="actualizarInterfaz()">
        <option value="cenotes" data-adulto="650" data-nino="450" data-desc="Explora 4 cenotes vírgenes en la zona de Cuzamá. Incluye transporte en truck (trenecito tirado por mulas) o bicicleta, nado libre y chalecos.">Tour 4 Cenotes</option>
        <option value="chichen" data-adulto="1200" data-nino="850" data-desc="Visita una de las maravillas del mundo. Incluye guía certificado, entrada a la zona arqueológica, visita a Valladolid y almuerzo regional buffet.">Chichén Itzá Premium</option>
        <option value="celestun" data-adulto="950" data-nino="700" data-desc="Paseo en lancha por la biósfera para observar flamencos rosas, recorrido por manglares y tiempo de playa en las costas de Celestún.">Celestún Flamingo Safari</option>
    </select>

    <div id="tour-desc" class="description-box">
        Explora 4 cenotes vírgenes en la zona de Cuzamá. Incluye transporte en truck (trenecito tirado por mulas) o bicicleta, nado libre y chalecos.
    </div>

    <span class="section-title">2. ¿Cuándo viajas?</span>
    <input type="text" id="rango-fechas" class="calendar-input" placeholder="Selecciona fechas...">

    <span class="section-title">3. Pasajeros</span>
    <div class="counter-group">
        <span>Adultos</span>
        <div>
            <button class="btn-qty" onclick="cambiarCant('adultos', -1)">-</button>
            <span id="qty-adultos" style="font-weight:bold; margin: 0 10px;">1</span>
            <button class="btn-qty" onclick="cambiarCant('adultos', 1)">+</button>
        </div>
    </div>

    <div class="counter-group">
        <span>Niños</span>
        <div>
            <button class="btn-qty" onclick="cambiarCant('ninos', -1)">-</button>
            <span id="qty-ninos" style="font-weight:bold; margin: 0 10px;">0</span>
            <button class="btn-qty" onclick="cambiarCant('ninos', 1)">+</button>
        </div>
    </div>

    <div class="summary-box">
        <span style="font-size: 13px; opacity: 0.9;">Total Estimado:</span>
        <span class="total-price" id="total-display">$650 MXN</span>
    </div>
    
    <a href="javascript:void(0)" onclick="enviarWhatsApp()" class="btn-whatsapp">Consultar por WhatsApp</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
    let cantAdultos = 1;
    let cantNinos = 0;
    let textoFechas = "";

    const cal = flatpickr("#rango-fechas", {
        mode: "range", minDate: "today", locale: "es", dateFormat: "d-m-Y",
        onClose: function(dates) {
            textoFechas = dates.length === 2 ? `${dates[0].toLocaleDateString()} al ${dates[1].toLocaleDateString()}` : (dates[0]?.toLocaleDateString() || "");
        }
    });

    function cambiarCant(tipo, n) {
        if(tipo === 'adultos') cantAdultos = Math.max(1, cantAdultos + n);
        else cantNinos = Math.max(0, cantNinos + n);
        document.getElementById(`qty-${tipo}`).innerText = tipo === 'adultos' ? cantAdultos : cantNinos;
        calcular();
    }

    function actualizarInterfaz() {
        const select = document.getElementById('tour-select');
        const desc = select.options[select.selectedIndex].getAttribute('data-desc');
        document.getElementById('tour-desc').innerText = desc;
        calcular();
    }

    function calcular() {
        const sel = document.getElementById('tour-select');
        const opt = sel.options[sel.selectedIndex];
        const total = (cantAdultos * parseInt(opt.dataset.adulto)) + (cantNinos * parseInt(opt.dataset.nino));
        document.getElementById('total-display').innerText = `$${total.toLocaleString()} MXN`;
    }

    function enviarWhatsApp() {
        if(!textoFechas) { alert("Elige una fecha"); return; }
        const tour = document.getElementById('tour-select').options[document.getElementById('tour-select').selectedIndex].text;
        const msg = `¡Hola! Me interesa *Un Amigo en Mérida*:\n🌴 *Tour:* ${tour}\n📅 *Fechas:* ${textoFechas}\n👥 *Adultos:* ${cantAdultos} | *Niños:* ${cantNinos}\n💰 *Total:* ${document.getElementById('total-display').innerText}`;
        window.open(`https://wa.me/525560040025?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
