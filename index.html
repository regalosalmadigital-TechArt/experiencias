<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuu Tech-Art | Diseño e Innovación</title>
    <style>
        :root {
            --primario: #d4af37; /* Dorado */
            --fondo: #121212;
            --texto: #f5f5f5;
            --gris-suave: #2a2a2a;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .contenedor {
            max-width: 800px;
            padding: 40px;
            border: 1px solid var(--gris-suave);
            border-radius: 15px;
            background: linear-gradient(145deg, #1a1a1a, #121212);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primario);
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitulo {
            font-size: 1.2rem;
            color: var(--primario);
            margin-bottom: 30px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .descripcion {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .servicios {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .servicio-item {
            padding: 20px;
            border: 1px solid var(--primario);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--primario);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
