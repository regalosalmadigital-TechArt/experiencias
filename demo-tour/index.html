<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Amigo en Mérida | Reservas Inteligentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --turquesa: #00C2CB;
            --turquesa-dark: #008B94;
            --white: #ffffff;
            --text: #333333;
            --light-bg: #f0fafa;
        }

        body { font-family: 'Urbanist', sans-serif; margin: 0; background-color: #f4f7f6; color: var(--text); }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1585647347483-22b66260dfff?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .hero h1 { font-size: 32px; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 500px; margin: -40px auto 50px; background: var(--white);
            padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section-title { color: var(--turquesa-dark); font-size: 14px; text-transform: uppercase; font-weight: bold; margin: 20px 0 10px 0; display: block; border-left: 4px solid var(--turquesa); padding-left: 10px;}

        .calendar-input, .tour-picker {
            width: 100%; padding: 15px; border: 2px solid var(--turquesa);
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
            background: var(--light-bg); cursor: pointer; font-family: inherit;
        }

        .counter-group { display: flex; align-items: center; justify-content: space-between; background: var(--light-bg); padding: 12px 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e0f2f2; }
        .counter-controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 50%; border: none; background: var(--turquesa); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-val { font-size: 18px; font-weight: bold; width: 20px; text-align: center; }

        .summary-box { background: var(--turquesa-dark); color: white; padding: 20px; border-radius: 16px; text-align: center; margin-top: 25px; }
        .total-price { font-size: 32px; font-weight: bold; display: block; }

        .btn-whatsapp { display: block; background: #25D366; color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; font-size: 18px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .warning { color: #ff4d4d; font-size: 13px; text-align: center; margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="hero">
    <h1>UN AMIGO EN MÉRIDA</h1>
    <p style="font-weight: bold; color: var(--turquesa);">Cenotes, Chichén y Aventuras</p>
</div>

<div class="container">
    <span class="section-title">1. Selecciona tu Destino</span>
    <select id="tour-select" class="tour-picker" onchange="calcular()">
        <option value="cenotes" data-adulto="650" data-nino="450">Tour 4 Cenotes (Bici/Tren)</option>
        <option value="chichen" data-adulto="1200" data-nino="850">Chichén Itzá Premium</option>
        <option value="celestun" data-adulto="950" data-nino="700">Celestún Flamingo Safari</option>
    </select>

    <span class="section-title">2. Fecha del Tour (Rango)</span>
    <input type="text" id="rango-fechas" class="calendar-input" placeholder="Toca para elegir fechas...">

    <span class="section-title">3. ¿Quiénes viajan?</span>
    
    <div class="counter-group">
        <span style="font-weight: bold;">Adultos</span>
        <div class="counter-controls">
            <button class="btn-qty" onclick="cambiarCant('adultos', -1)">-</button>
            <span id="qty-adultos" class="qty-val">1</span>
            <button class="btn-qty" onclick="cambiarCant('adultos', 1)">+</button>
        </div>
    </div>

    <div class="counter-group">
        <span style="font-weight: bold;">Niños (-12 años)</span>
        <div class="counter-controls">
            <button class="btn-qty" onclick="cambiarCant('ninos', -1)">-</button>
            <span id="qty-ninos" class="qty-val">0</span>
            <button class="btn-qty" onclick="cambiarCant('ninos', 1)">+</button>
        </div>
    </div>

    <div class="summary-box">
        <span style="font-size: 14px; opacity: 0.9;">Inversión Total Estimada:</span>
        <span class="total-price" id="total-display">$650 MXN</span>
    </div>

    <div id="error-msg" class="warning">⚠️ Por favor, selecciona una fecha válida</div>
    
    <a href="javascript:void(0)" onclick="intentarEnviar()" class="btn-whatsapp">
        Reservar por WhatsApp
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
    let cantAdultos = 1;
    let cantNinos = 0;
    let fechasTexto = "";

    // CONFIGURACIÓN DE FLATPICKR
    const calendario = flatpickr("#rango-fechas", {
        mode: "range",
        minDate: "today",
        locale: "es",
        dateFormat: "d-m-Y",
        onClose: function(selectedDates) {
            if(selectedDates.length === 2) {
                fechasTexto = `${selectedDates[0].toLocaleDateString()} al ${selectedDates[1].toLocaleDateString()}`;
            } else if (selectedDates.length === 1) {
                fechasTexto = selectedDates[0].toLocaleDateString();
            }
            if(fechasTexto) document.getElementById('error-msg').style.display = 'none';
        }
    });

    // CONEXIÓN OPCIONAL A SHEETDB (Descomentar y poner tu URL)
    // fetch('TU_URL_SHEETDB').then(r => r.json()).then(d => calendario.set("disable", d.map(i => i.fecha)));

    function cambiarCant(tipo, cambio) {
        if (tipo === 'adultos') {
            cantAdultos = Math.max(1, cantAdultos + cambio);
            document.getElementById('qty-adultos').innerText = cantAdultos;
        } else {
            cantNinos = Math.max(0, cantNinos + cambio);
            document.getElementById('qty-ninos').innerText = cantNinos;
        }
        calcular();
    }

    function calcular() {
        const select = document.getElementById('tour-select');
        const option = select.options[select.selectedIndex];
        const pAdulto = parseInt(option.getAttribute('data-adulto'));
        const pNino = parseInt(option.getAttribute('data-nino'));
        
        const total = (cantAdultos * pAdulto) + (cantNinos * pNino);
        document.getElementById('total-display').innerText = `$${total.toLocaleString()} MXN`;
    }

    function intentarEnviar() {
        if (!fechasTexto) {
            document.getElementById('error-msg').style.display = 'block';
            return;
        }

        const select = document.getElementById('tour-select');
        const tourName = select.options[select.selectedIndex].text;
        const total = document.getElementById('total-display').innerText;

        const telefono = "525560040025";
        let mensaje = `¡Hola! Me interesa reservar con *Un Amigo en Mérida*:\n\n`;
        mensaje += `🌴 *Tour:* ${tourName}\n`;
        mensaje += `📅 *Fechas:* ${fechasTexto}\n`;
        mensaje += `👥 *Adultos:* ${cantAdultos}\n`;
        mensaje += `👶 *Niños:* ${cantNinos}\n`;
        mensaje += `💰 *Total estimado:* ${total}\n\n`;
        mensaje += `¿Me podrían confirmar disponibilidad?`;

        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>

</body>
</html>
